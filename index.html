<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ViewStop - Simple Test</title>
    <style>
        body { background: #121212; color: white; font-family: sans-serif; text-align: center; padding: 50px; }
        button { background: #4285F4; color: white; border: none; padding: 15px 30px; font-size: 18px; border-radius: 5px; cursor: pointer; margin: 20px; }
        button:hover { background: #357ae8; }
        #videoPlayerSection { display: none; margin-top: 30px; }
        video { border: 2px solid #4285F4; border-radius: 8px; width: 100%; max-width: 600px; }
    </style>
</head>
<body>

    <h1>🎬 Welcome to ViewStop</h1>
    <p id="status">Please sign in to watch and interact with videos!</p>
    
    <button id="googleLoginBtn">Sign In with Google</button>
    <button id="logoutBtn" style="display: none;">Log Out</button>

    <div id="videoPlayerSection">
        <h2>🔥 Trending Video</h2>
        <video src="https://www.w3schools.com/html/mov_bbb.mp4" controls></video>
        <br>
        <button id="likeBtn">❤️ Like</button>
        <button id="idolBtn" style="background: #eccc68; color: #333;">🌟 Idol</button>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
