<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ViewStop - Share & Idol</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1 id="logo" style="cursor: pointer;">🎬 ViewStop</h1>
        <!-- Auth Bar -->
        <div id="authBar">
            <span id="userGreeting"></span>
            <div id="authInputs">
                <input type="email" id="authEmail" placeholder="Email">
                <input type="password" id="authPassword" placeholder="Password">
                <button id="signUpBtn">Sign Up</button>
                <button id="loginBtn">Log In</button>
            </div>
            <button id="logoutBtn" style="display: none;">Log Out</button>
        </div>
    </header>

    <!-- HOME VIEW -->
    <div id="homeView" class="view">
        <!-- Upload Section (Locked if logged out) -->
        <section class="upload-section" id="uploadSection">
            <h2>Upload to ViewStop</h2>
            <div id="uploadLockedMessage">⚠️ Please log in or create an account to publish videos!</div>
            <div id="uploadFields" style="display: none;">
                <input type="text" id="videoTitle" placeholder="Enter video title..." required>
                <input type="file" id="videoFile" accept="video/*" required>
                <button id="uploadBtn">Publish Video</button>
                <div id="uploadStatus"></div>
            </div>
        </section>

        <hr>

        <section class="feed-section">
            <h2>Public Feed</h2>
            <div id="videoFeed"></div>
        </section>
    </div>

    <!-- DEDICATED VIDEO VIEW -->
    <div id="videoView" class="view" style="display: none;">
        <button id="backHomeBtn">⬅️ Back to Home</button>
        <div id="singleVideoContainer">
            <!-- Focused video player logic will load here dynamically -->
        </div>
    </div>

    <!-- Firebase SDK Modules -->
    <script type="module" src="app.js"></script>
</body>
</html>
